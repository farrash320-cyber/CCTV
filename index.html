<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CCTV Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#05111f,#08192f);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{

width:400px;

padding:35px;

border-radius:30px;

background:rgba(20,30,50,.7);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 50px rgba(0,0,0,.5);

}

.logo{

text-align:center;

margin-bottom:20px;

}

.logo-icon{

font-size:55px;

margin-bottom:10px;

}

.logo h1{

font-size:38px;

}

.online{

text-align:center;

color:#22c55e;

margin-bottom:25px;

font-size:18px;

}

.clock{

font-size:55px;

font-weight:bold;

text-align:center;

margin-bottom:10px;

}

.date{

text-align:center;

color:#d1d5db;

margin-bottom:30px;

}

.menu{

background:rgba(40,70,120,.8);

padding:18px;

border-radius:18px;

margin-bottom:15px;

display:flex;

justify-content:space-between;

align-items:center;

cursor:pointer;

transition:.3s;

}

.menu:hover{

transform:translateY(-4px);

background:#2f5ea5;

}

.arrow{

font-size:22px;

}

.logout{

background:#ef4444;

}

.logout:hover{

background:#dc2626;

}

</style>

</head>
<body>

<div class="container">

class="clock"
id="clock">

</div>

class="date"
id="date">

</div>


<div class="menu">

<div>

</div>

</div>


<div class="menu">

<div>

📹 Kamera Garasi

<div class="arrow">

<script>

function updateClock(){

let now = new Date();

document.getElementById("clock")
.innerHTML =
now.toLocaleTimeString("id-ID");

document.getElementById("date")
.innerHTML =
now.toLocaleDateString(
"id-ID",
{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
}
);

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
