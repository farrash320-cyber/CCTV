<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CCTV Premium</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="main">

<div class="glass"
style="
max-width:450px;
margin:auto;
margin-top:60px;
">

<div class="title">

<h1>

📷 CCTV Premium

</h1>

</div>

<div
class="online"
style="margin-bottom:40px;">

Silakan login

</div>


<input

type="text"

id="username"

placeholder="Username"

onkeydown="handleKey(event)"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-bottom:20px;
font-size:16px;
outline:none;
">


<input

type="password"

id="password"

placeholder="Password"

onkeydown="handleKey(event)"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-bottom:25px;
font-size:16px;
outline:none;
">


<button

onclick="login()"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
">

Masuk

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
