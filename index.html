<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CCTV Premium V21 Ultimate</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>

📷 CCTV Premium

</h1>

<div
class="group"
style="
text-align:center;
margin-top:15px;
">

DIFFARRAS GROUP

</div>


<p>

Silakan login

</p>



<input
type="text"
id="username"
placeholder="Username"
onkeydown="handleKey(event)">



<div
style="
position:relative;
">

<input
type="password"
id="password"
placeholder="Password"
onkeydown="handleKey(event)"
style="
padding-right:70px;
">


<span

onclick="togglePassword()"

style="
position:absolute;
right:25px;
top:22px;
font-size:22px;
cursor:pointer;
user-select:none;
">

👁

</span>

</div>



<button
id="loginButton"
onclick="login()">

Masuk

</button>



<div class="version">

🔥 V21 Ultimate Pro Luxury

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
