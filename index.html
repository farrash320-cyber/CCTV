<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Rumah</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#081225;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#1b263b;
    width:350px;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

p{
    margin-bottom:25px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.btn{
    background:#22c55e;
    color:white;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

#loginPage,
#cctvPage{
    display:none;
}
</style>
</head>
<body>

<!-- Halaman Awal -->
<div class="container" id="homePage">
    <h1>📷 CCTV Rumah</h1>
    <p>Klik tombol di bawah untuk masuk.</p>

    <button class="btn" onclick="showLogin()">
        Lihat CCTV
    </button>
</div>

<!-- Halaman Login -->
<div class="container" id="loginPage">
    <h1>🔒 Login</h1>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button class="btn" onclick="login()">
        Masuk
    </button>
</div>

<!-- Halaman CCTV -->
<div class="container" id="cctvPage">
    <h1>📷 CCTV Rumah</h1>

    <p>Login berhasil.</p>

    <p>Halaman CCTV siap digunakan.</p>

    <button class="btn" oneclick="logout()">
        Logout
    </button>
</div>

<script>
function showLogin(){
    document.getElementById("homePage").style.display="none";
    document.getElementById("loginPage").style.display="block";
}

function login(){

    let username=document.getElementById("username").value;
    let password=document.getElementById("password").value;

    if(username=="marelan" && password=="kebahagiaan"){

        document.getElementById("loginPage").style.display="none";
        document.getElementById("cctvPage").style.display="block";

    }else{
        alert("Username atau password salah!");
    }

}
</script>

</body>
</html>
