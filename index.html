<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CCTV Premium</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- HOME -->
<div class="page active" id="homePage">

<div class="card">

<h1>📷 CCTV Premium</h1>

<p>
Selamat datang
</p>

<button class="green"
onclick="showLogin()">

Lihat CCTV

</button>

</div>

</div>


<!-- LOGIN -->
<div class="page" id="loginPage">

<div class="card">

<h1>🔒 Login</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button
class="green"
onclick="login()">

Masuk

</button>

</div>

</div>



<!-- DASHBOARD -->
<div class="page" id="dashboardPage">

<div class="card">

<h1>📷 CCTV Premium</h1>

<div class="status">

● ONLINE

</div>

<div class="clock"
id="clock">

00:00:00

</div>

<div class="date"
id="date">

-

</div>

<button class="blue">

📹 Kamera Depan

</button>

<button class="blue">

📹 Kamera Garasi

</button>

<button class="blue">

📹 Kamera Belakang

</button>

<button
class="red"
onclick="logout()">

Logout

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
