<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CCTV Premium</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#06101d,#091a32);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    padding:35px;
    border-radius:30px;

    background:rgba(20,32,52,.75);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 20px 40px rgba(0,0,0,.4);

}

.logo{
    text-align:center;
}

.logo-icon{
    font-size:50px;
}

.logo h1{
    color:white;
    margin-top:10px;
}

.status{
    text-align:center;
    color:#22c55e;
    margin-top:25px;
    font-size:18px;
}

.clock{
    text-align:center;
    color:white;
    font-size:52px;
    font-weight:bold;
    margin-top:30px;
}

.date{
    text-align:center;
    color:#d1d5db;
    margin-top:10px;
    margin-bottom:35px;
}

.card{
    background:#1f3b63;
    padding:18px 20px;
    border-radius:18px;
    color:white;
    margin-bottom:15px;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-3px);
    background:#2b4d7d;
}

.logout{
    background:#ef4444;
}

.logout:hover{
    background:#dc2626;
}

</style>

</head>
<body>

<div class="container">

    <div class="logo">

        <div class="logo-icon">
            📷
        </div>

        <h1>CCTV Premium</h1>

    </div>

    <div class="status">
        ● ONLINE
    </div>

    <div class="clock"
    id="clock">
        00:00:00
    </div>

    <div class="date"
    id="date">
        -
    </div>

    <div class="card">
        📹 Kamera Depan
    </div>

    <div class="card">
        📹 Kamera Garasi
    </div>

    <div class="card">
        📹 Kamera Belakang
    </div>

    <div class="card">
        👤 Profil
    </div>

    <div class="card">
        ⚙️ Pengaturan
    </div>

    <div class="card logout">
        🚪 Logout
    </div>

</div>

<script>

function updateClock(){

    let now = new Date();

    document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("id-ID");

    document.getElementById("date").innerHTML =
    now.toLocaleDateString("id-ID",{
        weekday:"long",
        day:"numeric",
        month:"long",
        year:"numeric"
    });

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
