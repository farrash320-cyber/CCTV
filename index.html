<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>CCTV Premium</title>

<link
rel="stylesheet"
href="style.css">

</head>
<body>

<div
style="
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
">

<div class="glass"
style="max-width:450px;width:100%;">

<div class="title">

<h1>

📷 CCTV Premium

</h1>

</div>

<div class="online">

Silakan login

</div>


<input
id="username"
type="text"
placeholder="Username"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-bottom:15px;
font-size:16px;
">


<input
id="password"
type="password"
placeholder="Password"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-bottom:20px;
font-size:16px;
">


<button

onclick="login()"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:#2563eb;
color:white;
font-size:17px;
cursor:pointer;
">

Masuk

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
