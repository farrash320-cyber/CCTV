<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CCTV Premium V17</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="main">

<div
class="glass"
style="
max-width:450px;
margin:auto;
margin-top:60px;
">

<div class="title">

<h1>

📷 CCTV Premium

</h1>

</div>

<div
class="online"
style="margin-bottom:35px;">

Silakan login

</div>



<input
type="text"
id="username"
placeholder="Username"
onkeydown="handleKey(event)"
style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-bottom:20px;
font-size:16px;
outline:none;
">


<input
type="password"
id="password"
placeholder="Password"
onkeydown="handleKey(event)"
style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-bottom:20px;
font-size:16px;
outline:none;
">



<div
style="
margin-bottom:25px;
display:flex;
align-items:center;
gap:10px;
">

<input
type="checkbox"
id="remember">

<label for="remember">

Ingat saya

</label>

</div>



<button

onclick="login()"

id="loginButton"

style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
">

Masuk

</button>


<div
style="
margin-top:30px;
text-align:center;
color:#d1d5db;
">

🔥 V17 Ultimate

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
