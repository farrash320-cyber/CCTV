<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page active" id="homePage">
    <div class="card">
        <h1>📷 CCTV Premium</h1>
        <p>Selamat datang</p>

        <button class="green" onclick="showLogin()">
            Lihat CCTV
        </button>
    </div>
</div>

<div class="page" id="loginPage">
    <div class="card">
        <h1>🔒 Login</h1>

        <input id="username" type="text" placeholder="Username">

        <input id="password" type="password" placeholder="Password">

        <button class="green" onclick="login()">
            Masuk
        </button>
    </div>
</div>

<div class="page" id="dashboardPage">
    <div class="card">

        <h1>📷 CCTV Premium</h1>

        <div class="status">
            ● ONLINE
        </div>

        <div class="clock" id="clock">
            00:00:00
        </div>

        <div class="date" id="date"></div>

        <button class="blue menu">
            Kamera Depan
        </button>

        <button class="blue menu">
            Kamera Garasi
        </button>

        <button class="blue menu">
            Kamera Belakang
        </button>

        <button class="red" onclick="logout()">
            Logout
        </button>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
